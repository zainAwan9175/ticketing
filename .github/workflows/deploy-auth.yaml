# =============================================================================
#  deploy-auth  —  Build the "auth" service and ship it to GKE (Google Cloud)
# -----------------------------------------------------------------------------
#  What this does, in plain English:
#    1. Build a Docker image from the auth/ folder
#    2. Push that image to Google Artifact Registry (our private image store)
#    3. Tell our GKE cluster to run the new image
#
#  This replaces the old DigitalOcean flow (doctl + Docker Hub).
# =============================================================================

name: deploy-auth

# ---- WHEN does this run? -----------------------------------------------------
# Only when code inside the auth/ folder is pushed to the main branch.
on:
  push:
    branches:
      - main
    paths:
      - 'auth/**'

# ---- OUR GCP VALUES (change these once if your project ever changes) ---------
env:
  PROJECT_ID: ride-wave-464217   # GCP project ID
  REGION: asia-south1            # Artifact Registry region (Mumbai)
  REPO: ticketing                # Artifact Registry repository name
  CLUSTER: ticketing             # GKE cluster name
  ZONE: asia-south1-a            # GKE cluster zone
  SERVICE: auth                  # this service = image name = deployment/container name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1) Copy our repository onto the GitHub runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Log in to Google Cloud.
      #    GCP_SA_KEY is the Service Account JSON key you saved under
      #    GitHub repo > Settings > Secrets and variables > Actions.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3) Install the gcloud CLI (it reuses the login from step 2)
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4) Let `docker push` authenticate to Artifact Registry in our region
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 5) Build the Docker image from this service's folder.
      #    We tag it with the commit SHA (github.sha) so every push produces a
      #    UNIQUE image tag — that is what forces the cluster to pull new code.
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }} \
            ./${{ env.SERVICE }}

      # 6) Upload the image to Artifact Registry
      - name: Push Docker image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}

      # 7) Point kubectl at our GKE cluster (the GCP version of "doctl ... kubeconfig save")
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.ZONE }}

      # 8) Swap the running deployment onto the new image.
      #    Format: kubectl set image deployment/<name> <container>=<image>
      #    This triggers a rolling update automatically (no separate restart needed).
      - name: Roll out the new image
        run: |
          kubectl set image deployment/${{ env.SERVICE }}-depl \
            ${{ env.SERVICE }}=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
