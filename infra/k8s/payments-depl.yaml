# Which Kubernetes API version should be used
apiVersion: apps/v1

# Type of Kubernetes resource
kind: Deployment

# Information about the Deployment itself
metadata:

  # Name of the Deployment
  name: payments-depl

# Desired configuration of the Deployment
spec:

  # Number of Pod copies you want running
  replicas: 1

  # Which Pods belong to this Deployment
  selector:
    matchLabels:
      app: payments

  # Template for creating Pods
  template:

    # Pod metadata
    metadata:
      labels:
        app: payments

    # Pod specification
    spec:

      # Containers inside the Pod
      containers:

        # Container configuration
        - name: payments

          # Docker image
          # image: zainawan9175/payments                                  # old: Docker Hub
          image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/payments
          imagePullPolicy: IfNotPresent

          # Environment variables
          env:

            # Name of env variable inside container
            - name: JWT_KEY

              # Value comes from Kubernetes Secret
              valueFrom:

                # Read from Secret
                secretKeyRef:

                  # Secret name
                  name: jwt-secret

                  # Key inside the Secret
                  key: JWT_KEY
            - name: STRIPE_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_KEY

            - name: MONGO_URI
              value: mongodb://payments-mongo-srv:27017/payments

            - name: payments_PORT
              value: "3000"

            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: NATS_URL
              value: 'http://nats-srv:4222'

            - name: NATS_CLUSTER_ID
              value: ticketing

          # Exposed container port
          ports:
            - containerPort: 3000
          



---
apiVersion: v1
kind: Service
metadata:
  name: payments-srv
spec:
  selector: 
    app: payments
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
