apiVersion: skaffold/v2alpha3
kind: Config

deploy:
  kubectl:
    manifests:
      - ./infra/k8s/*
      

build:
  local:
    # push: false      # old: local-only (Docker Desktop), no registry push
    push: true          # GKE: build locally and push to Artifact Registry

  artifacts:
    # - image: zainawan9175/auth                                        # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/auth
      context: auth

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .

    # - image: zainawan9175/client                                      # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/client
      context: client

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: '**/*.js'
            dest: .

    # - image: zainawan9175/tickets                                     # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/tickets
      context: tickets

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .

    # - image: zainawan9175/orders                                      # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/orders
      context: orders

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    # - image: zainawan9175/expiration                                  # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/expiration
      context: expiration

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    # - image: zainawan9175/payments                                    # old: Docker Hub
    - image: asia-south1-docker.pkg.dev/ride-wave-464217/ticketing/payments
      context: payments

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
            
