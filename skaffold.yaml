apiVersion: skaffold/v2alpha3
kind: Config

deploy:
  kubectl:
    manifests:
      - ./infra/k8s/*

build:
  local:
    push: true

  artifacts:
    - image: zainawan9175/auth
      context: auth

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .

    - image: zainawan9175/client
      context: client

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: '**/*.js'
            dest: .

    - image: zainawan9175/tickets
      context: tickets

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .

    - image: zainawan9175/orders
      context: orders

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    - image: zainawan9175/expiration
      context: expiration

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
    - image: zainawan9175/payments
      context: payments

      docker:
        dockerfile: Dockerfile

      sync:
        manual:
          - src: 'src/**/*.ts'
            dest: .
            
